<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px 20px;
    }
    .container {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    h2 { text-align: center; color: #2d3748; margin-bottom: 24px; font-size: 24px; }
    .input-area { display: flex; gap: 10px; margin-bottom: 24px; }
    input[type="text"] {
      flex: 1; padding: 12px 14px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; transition: border-color 0.2s;
    }
    input[type="text"]:focus { outline: none; border-color: #667eea; }
    .add-btn {
      padding: 12px 20px;
      background: #667eea; color: white;
      border: none; border-radius: 10px;
      font-size: 18px; cursor: pointer; transition: background 0.2s;
    }
    .add-btn:hover { background: #5a67d8; }
    .stats { display: flex; gap: 12px; margin-bottom: 16px; font-size: 13px; color: #718096; }
    .stat span { font-weight: 700; color: #667eea; }
    ul { list-style: none; }
    li {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; margin-bottom: 10px;
      background: #f7fafc; border-radius: 10px;
      border: 1px solid #e2e8f0; transition: all 0.2s;
    }
    li:hover { border-color: #667eea; }
    li.completed { background: #f0fff4; border-color: #9ae6b4; }
    li.completed .task-text { text-decoration: line-through; color: #a0aec0; }
    .task-text { flex: 1; font-size: 14px; color: #2d3748; }
    .done-btn {
      background: #48bb78; color: white;
      border: none; border-radius: 7px;
      padding: 5px 12px; cursor: pointer; font-size: 13px;
    }
    .del-btn {
      background: #fc8181; color: white;
      border: none; border-radius: 7px;
      padding: 5px 12px; cursor: pointer; font-size: 13px;
    }
    .empty { text-align: center; color: #a0aec0; padding: 30px; font-size: 15px; }
  </style>
</head>
<body>
<div class="container">
  <h2>📝 To-Do List</h2>
  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()">
    <button class="add-btn" onclick="addTask()">+</button>
  </div>
  <div class="stats">
    <div>Total: <span id="total">0</span></div>
    <div>Done: <span id="done">0</span></div>
    <div>Pending: <span id="pending">0</span></div>
  </div>
  <ul id="taskList">
    <li class="empty" id="emptyMsg">No tasks yet. Add one above! ☝️</li>
  </ul>
</div>

<script>
  let tasks = [];

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ text, completed: false });
    input.value = '';
    renderList();
  }

  function toggleDone(index) {
    tasks[index].completed = !tasks[index].completed;
    renderList();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    renderList();
  }

  function renderList() {
    const ul = document.getElementById('taskList');
    const empty = document.getElementById('emptyMsg');

    if (tasks.length === 0) {
      ul.innerHTML = '<li class="empty" id="emptyMsg">No tasks yet. Add one above! ☝️</li>';
    } else {
      ul.innerHTML = tasks.map((t, i) => `
        <li class="${t.completed ? 'completed' : ''}">
          <span class="task-text">${t.text}</span>
          <button class="done-btn" onclick="toggleDone(${i})">${t.completed ? 'Undo' : 'Done'}</button>
          <button class="del-btn" onclick="deleteTask(${i})">Delete</button>
        </li>`).join('');
    }

    const done = tasks.filter(t => t.completed).length;
    document.getElementById('total').textContent = tasks.length;
    document.getElementById('done').textContent = done;
    document.getElementById('pending').textContent = tasks.length - done;
  }
</script>
</body>
</html>
